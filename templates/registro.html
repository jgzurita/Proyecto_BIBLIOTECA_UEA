{% extends "base.html" %}

{% block content %}

<h2>Registro</h2>

<form method="POST">

<label>Nombre</label>
<input type="text" name="nombre">

<label>Email</label>
<input type="email" name="email">

<label>Teléfono</label>
<input type="telefono" name="telefono">

<label>Contraseña</label>
<input type="password" name="password">

<button type="submit">Registrarse</button>

</form>

{% endblock %}
